<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nagare</title>
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="kit.css">
<style>html,body{margin:0;height:100%}#root{position:absolute;inset:0}</style>
</head><body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="store.js"></script>
<script type="text/babel" src="AppShell.jsx"></script>
<script type="text/babel" src="DashboardPage.jsx"></script>
<script type="text/babel" src="ProfilesPage.jsx"></script>
<script type="text/babel" src="ChannelsPage.jsx"></script>
<script type="text/babel">
const { useState } = React;
function App() {
  const [page, setPage] = useState("dashboard");
  const AppShell = window.AppShell;
  const Page = page === "profiles" ? window.ProfilesPage : page === "channels" ? window.ChannelsPage : window.DashboardPage;
  return <AppShell page={page} onNavigate={setPage}><Page /></AppShell>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body></html>
