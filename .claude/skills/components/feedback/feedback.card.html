<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css"><style>
html,body{margin:0}body{background:var(--bg-base);color:var(--text-primary);font-family:var(--font-sans);padding:20px}
.stack{display:flex;flex-direction:column;gap:10px;max-width:560px}
.row{display:flex;gap:24px;align-items:center;margin-top:14px}
.frame{position:relative;height:200px;margin-top:14px;border:1px dashed var(--stroke-divider);border-radius:var(--radius-overlay);overflow:hidden}
</style></head><body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { InfoBar, ProgressRing, ContentDialog } = window.NagareDesignSystem_9475eb;
function Demo(){
  return (<div>
    <div className="stack">
      <InfoBar severity="error" title="Environnement ffmpeg" message="ffmpeg est introuvable. Renseignez son chemin, ou ajoutez ffmpeg au PATH." />
      <InfoBar severity="warning" title="Réglage refusé" message="E4: bufsize must be greater than or equal to bitrate." isClosable />
      <InfoBar severity="success" title="Session arrêtée" message="Aucun drop, aucune reconnexion." />
    </div>
    <div className="row">
      <ProgressRing label="Démarrage…" />
      <ProgressRing size={20} label="Analyse du fichier…" />
    </div>
    <div className="frame">
      <ContentDialog contained title="Supprimer le channel « Twitch principal » ?"
        primaryText="Supprimer" primaryVariant="danger" closeText="Annuler">
        Cette action est définitive. Vous devrez ressaisir la clé de stream pour recréer ce channel.
      </ContentDialog>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body></html>
