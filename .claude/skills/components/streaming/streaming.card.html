<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css"><style>
html,body{margin:0}body{background:var(--bg-base);color:var(--text-primary);font-family:var(--font-sans);padding:20px}
.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
.tiles{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.cap{font-size:11px;color:var(--text-tertiary);font-family:var(--font-mono);margin-bottom:8px}
.checkbox{max-width:300px}
</style></head><body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { StatusBadge, StatTile, LaunchChecklist } = window.NagareDesignSystem_9475eb;
function Demo(){
  return (<div>
    <div className="cap">StatusBadge — shape + icon + text, never color alone</div>
    <div className="row">
      <StatusBadge tone="live">En direct</StatusBadge>
      <StatusBadge tone="success">En cours · sain</StatusBadge>
      <StatusBadge tone="attention">Reconnexion…</StatusBadge>
      <StatusBadge tone="critical">Échec</StatusBadge>
      <StatusBadge tone="neutral">Aucune session</StatusBadge>
    </div>
    <div className="cap">StatTile — chunked stats (last tile = health warning)</div>
    <div className="tiles">
      <StatTile label="Images" value="60" unit="fps" icon="film" />
      <StatTile label="Débit" value="5 998" unit="kbits/s" icon="activity" />
      <StatTile label="Vitesse" value="1,00" unit="x" icon="gauge" />
      <StatTile label="Drops" value="0" unit="drops" />
      <StatTile label="Vitesse" value="0,82" unit="x" icon="gauge" warning />
    </div>
    <div className="cap">LaunchChecklist — why "Démarrer" is disabled, without a click</div>
    <div className="checkbox">
      <LaunchChecklist items={[
        {label:"Environnement ffmpeg",done:true},
        {label:"Fichier vidéo",done:true},
        {label:"Profil d'encodage",done:false},
        {label:"Channel",done:false},
      ]} />
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body></html>
