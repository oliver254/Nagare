<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css"><style>
html,body{margin:0}body{background:var(--bg-base);color:var(--text-primary);font-family:var(--font-sans);padding:20px}
.row{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:14px}
.cap{font-size:11px;color:var(--text-tertiary);font-family:var(--font-mono);margin-bottom:6px}
</style></head><body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Button, IconButton } = window.NagareDesignSystem_9475eb;
function Demo(){
  return (<div>
    <div className="cap">variants — accent is the single primary per screen</div>
    <div className="row">
      <Button variant="accent" icon="play">Démarrer</Button>
      <Button>Arrêter</Button>
      <Button variant="subtle" icon="pencil">Modifier</Button>
      <Button variant="hyperlink">En savoir plus</Button>
      <Button variant="danger" icon="trash-2">Supprimer</Button>
    </div>
    <div className="cap">sizes · icon position</div>
    <div className="row">
      <Button size="small" icon="plus">Nouveau</Button>
      <Button icon="folder-open">Choisir un fichier…</Button>
      <Button icon="chevron-right" iconPosition="end">Suivant</Button>
    </div>
    <div className="cap">disabled · icon buttons</div>
    <div className="row">
      <Button variant="accent" disabled icon="play">Démarrer</Button>
      <Button disabled>Arrêter</Button>
      <IconButton icon="copy" label="Copier la commande" />
      <IconButton icon="pencil" label="Modifier" />
      <IconButton icon="trash-2" label="Supprimer" />
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body></html>
