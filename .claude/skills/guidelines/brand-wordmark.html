<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
html,body{margin:0}body{background:var(--bg-base);color:var(--text-primary);font-family:var(--font-display);padding:18px;display:flex;gap:28px;align-items:center}
.mark{display:flex;align-items:center;gap:14px}

<div class="mark"><span class="kanji">流</span><span class="name">Nagare</span></div>
<div style="display:flex;flex-direction:column;gap:14px">
<div class="small"><span class="kanji">流</span><span class="name">Nagare</span></div>
<div class="note">流 (<i>nagare</i>, “flow / current”) is the brand glyph. This is a <b>type</b> treatment — there is no logo image asset in the source; render the name in type wherever a mark is needed.</div>
</div>
</body></html>
