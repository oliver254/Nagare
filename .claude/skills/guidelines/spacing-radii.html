<!-- @dsCard group="Spacing" viewport="700x160" name="Corner radii" subtitle="Control 4 · overlay 8 · circle" -->
<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
html,body{margin:0}body{background:var(--bg-base);color:var(--text-primary);font-family:var(--font-sans);padding:18px}
.row{display:flex;gap:20px;align-items:flex-end}
.item{text-align:center}
.box{width:96px;height:64px;background:var(--surface-card);border:1px solid var(--stroke-control-secondary)}
.nm{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);margin-top:8px}
.dc{font-size:11px;color:var(--text-tertiary)}
</style></head><body>
<div class="row">
<div class="item"><div class="box" style="border-radius:var(--radius-small)"></div><div class="nm">--radius-small</div><div class="dc">2 · focus, marks</div></div>
<div class="item"><div class="box" style="border-radius:var(--radius-control)"></div><div class="nm">--radius-control</div><div class="dc">4 · buttons, inputs</div></div>
<div class="item"><div class="box" style="border-radius:var(--radius-overlay)"></div><div class="nm">--radius-overlay</div><div class="dc">8 · cards, dialogs</div></div>
<div class="item"><div class="box" style="width:64px;border-radius:var(--radius-circle)"></div><div class="nm">--radius-circle</div><div class="dc">pills, badges</div></div>
</div>
</body></html>
