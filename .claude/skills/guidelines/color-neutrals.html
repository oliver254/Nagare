<!-- @dsCard group="Colors" viewport="700x150" name="Neutral greys" subtitle="Fluent grey ramp — surfaces, strokes, text" -->
<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
html,body{margin:0}body{background:var(--bg-base);font-family:var(--font-sans);color:var(--text-primary);padding:16px}
.sw{display:flex;border-radius:var(--radius-control);overflow:hidden;border:1px solid var(--stroke-card)}
.sw>div{flex:1;height:56px;display:flex;align-items:flex-end;justify-content:center;padding:4px;font-size:10px;font-family:var(--font-mono);color:var(--text-secondary)}
.lab{margin-top:10px;font-size:12px;line-height:16px;color:var(--text-secondary)}
</style></head><body>
<div class="sw">
<div style="background:var(--grey-0)">0</div>
<div style="background:var(--grey-8)">8</div>
<div style="background:var(--grey-12)">12</div>
<div style="background:var(--grey-16)">16</div>
<div style="background:var(--grey-24)">24</div>
<div style="background:var(--grey-32)">32</div>
<div style="background:var(--grey-48)">48</div>
<div style="background:var(--grey-96);color:#fff">96</div>
<div style="background:var(--grey-140);color:#fff">140</div>
<div style="background:var(--grey-168);color:#fff">168</div>
<div style="background:var(--grey-188);color:#fff">188</div>
<div style="background:var(--grey-204);color:#fff">204</div>
</div>
<div class="lab">Neutrals do the work. Light surfaces sit around grey-8/12/16; dark around grey-168/188/196. Numbers follow the Fluent grey index.</div>
</body></html>
