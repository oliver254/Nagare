<!-- @dsCard group="Spacing" viewport="700x230" name="Spacing scale" subtitle="4px grid — the values the Nagare XAML uses" -->
<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
html,body{margin:0}body{background:var(--bg-base);color:var(--text-primary);font-family:var(--font-sans);padding:18px}
.row{display:flex;align-items:center;gap:12px;margin-bottom:5px}
.name{width:96px;font-family:var(--font-mono);font-size:11px;color:var(--text-secondary)}
.bar{height:14px;background:var(--accent-fill);border-radius:2px}
.val{font-size:11px;color:var(--text-tertiary);font-family:var(--font-mono)}
</style></head><body>
<div class="row"><span class="name">--space-xs</span><span class="bar" style="width:4px"></span><span class="val">4</span></div>
<div class="row"><span class="name">--space-sm</span><span class="bar" style="width:8px"></span><span class="val">8 · inline</span></div>
<div class="row"><span class="name">--space-md</span><span class="bar" style="width:12px"></span><span class="val">12 · field rhythm</span></div>
<div class="row"><span class="name">--space-lg</span><span class="bar" style="width:16px"></span><span class="val">16 · card padding & gap</span></div>
<div class="row"><span class="name">--space-xl</span><span class="bar" style="width:20px"></span><span class="val">20</span></div>
<div class="row"><span class="name">--space-2xl</span><span class="bar" style="width:24px"></span><span class="val">24 · page frame</span></div>
<div class="row"><span class="name">--space-3xl</span><span class="bar" style="width:32px"></span><span class="val">32</span></div>
<div class="row"><span class="name">--space-4xl</span><span class="bar" style="width:40px"></span><span class="val">40</span></div>
</body></html>
